<style>
:root{--bg:#F8F8FA;--text:#1C1C1E;--sub:#8E8E93;--accent:#636378;--card:#FFF;--border:#E5E5EA;--r:14px;--font:-apple-system,"SF Pro Display","Helvetica Neue","PingFang SC",sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0C0C0E;--text:#E5E5E7;--sub:#8E8E93;--card:#1C1C1E;--border:#2C2C2E;--accent:#A0A0B0}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;line-height:1.8;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:48px 20px 80px}
.lang-bar{display:flex;gap:6px;margin-bottom:32px;flex-wrap:wrap;justify-content:flex-end}
.lang-bar a{color:var(--sub);font-size:11px;text-decoration:none;padding:4px 8px;border-radius:5px;border:1px solid var(--border);transition:.2s;cursor:pointer}
.lang-bar a.on,.lang-bar a:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
h1{font-size:28px;font-weight:200;letter-spacing:-.3px;margin-bottom:4px}
.d{font-size:13px;color:var(--sub);margin-bottom:32px}
section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px 22px;margin-bottom:14px}
section h2{font-size:17px;font-weight:500;margin-bottom:12px;color:var(--accent)}
section p,section li{font-size:14px;font-weight:300}
section ul{padding-left:20px}
section li{margin-bottom:5px}
.ft{text-align:center;color:var(--sub);font-size:12px;margin-top:40px}
.logo{text-align:center;margin-bottom:32px}
.logo .emoji{font-size:48px}
.app-name{font-size:22px;font-weight:300;letter-spacing:1px;margin-top:8px}
.version{font-size:13px;color:var(--sub);margin-top:2px}
</style>
</head>

var L=['en','zh-Hant','ja','ko','fr','de','es','pt-BR','it','ru','ar'];
L.forEach(function(l){if(!D[l])D[l]=D['en']});

function render(lang){if(!D[lang])lang='en';
  var d=D[lang],h='<div class="lang-bar">';
  L.forEach(function(l){h+='<a class="'+(l===lang?'on':'')+'" onclick="render(\''+l+'\')">'+D[l].n+'</a>'});
  h+='</div><h1>'+d.t+'</h1><div class="d">'+d.d+'</div>';
  d.sec.forEach(function(s){h+='<section><h2>'+s.h+'</h2>';if(s.p)h+='<p>'+s.p+'</p>';
    if(s.ul&&s.ul.length)h+='<ul>'+s.ul.map(function(i){return'<li>'+i+'</li>'}).join('')+'</ul>';h+='</section>';});
  h+='<div class="ft">&copy; 2026 Huezy</div>';
  document.getElementById('app').innerHTML=h;
}
var nav=(navigator.language||'en');
var found=L.indexOf(nav);
if(found===-1){var n2=nav.split('-')[0];L.forEach(function(l){if(l.startsWith(n2))found=L.indexOf(l)})}
render(found!==-1?L[found]:'en');
