<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback · Huezy</title>
<style>
:root{--bg:#F8F8FA;--text:#1C1C1E;--sub:#8E8E93;--accent:#636378;--card:#FFF;--border:#E5E5EA;--r:14px;--font:-apple-system,"SF Pro Display","Helvetica Neue","PingFang SC",sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0C0C0E;--text:#E5E5E7;--sub:#8E8E93;--card:#1C1C1E;--border:#2C2C2E;--accent:#A0A0B0}}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;line-height:1.8;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:48px 20px 80px}
.lang-bar{display:flex;gap:6px;margin-bottom:32px;flex-wrap:wrap;justify-content:flex-end}
.lang-bar a{color:var(--sub);font-size:11px;text-decoration:none;padding:4px 8px;border-radius:5px;border:1px solid var(--border);transition:.2s;cursor:pointer}
.lang-bar a.on,.lang-bar a:hover{background:var(--text);color:var(--bg);border-color:var(--text)}
h1{font-size:28px;font-weight:200;letter-spacing:-.3px;margin-bottom:4px}
.d{font-size:13px;color:var(--sub);margin-bottom:32px}
section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px 22px;margin-bottom:14px}
section h2{font-size:17px;font-weight:500;margin-bottom:12px;color:var(--accent)}
section p,section li{font-size:14px;font-weight:300}
section ul{padding-left:20px}
section li{margin-bottom:5px}
a.mail{color:var(--accent);text-decoration:none;font-weight:400}
.ft{text-align:center;color:var(--sub);font-size:12px;margin-top:40px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
var D={
'zh-Hant':{n:'中文',t:'意见反馈',d:'更新于 2026年7月',sec:[
{h:'联系我们',p:'如果您在使用中遇到任何问题，或有任何建议和意见，欢迎通过以下方式联系我们：',ul:['邮箱：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'常见问题',p:'',ul:[
'Q：如何取消订阅？<br>A：前往 iPhone「设置」→ 点击您的 Apple ID →「订阅」→ 选择 Huezy 即可管理。',
'Q：作品丢失了怎么办？<br>A：作品存储在设备本地，删除应用会清除所有作品。建议定期导出备份。',
'Q：如何更换语言？<br>A：前往「我的」页面 →「语言设置」即可切换。',
'Q：订阅后还是无法使用？<br>A：请尝试在「会员中心」点击「恢复购买」，或重启应用。如仍无法解决，请发送邮件。']}
]},
'en':{n:'English',t:'Feedback',d:'Updated July 2026',sec:[
{h:'Get in Touch',p:'Encountering issues or have suggestions? Reach us at:',ul:['Email: <a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:[
'Q: How to cancel subscription?<br>A: iPhone Settings → Apple ID → Subscriptions → Huezy.',
'Q: Lost artwork?<br>A: Artwork is stored locally. Deleting the app removes all works. Backup regularly.',
'Q: How to change language?<br>A: "Mine" → "Language".',
'Q: Subscribed but can\'t access?<br>A: Try "Restore Purchases", or restart the app. If still stuck, email us.']}
]},
'ja':{n:'日本語',t:'フィードバック',d:'2026年7月更新',sec:[
{h:'お問い合わせ',p:'ご不明な点やご意見がございましたら、以下までご連絡ください：',ul:['メール：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'よくある質問',p:'',ul:[
'Q：サブスクリプションの解約方法は？<br>A：iPhone「設定」→ Apple ID →「サブスクリプション」→ Huezy。',
'Q：作品が消えました。<br>A：作品は端末ローカルに保存。定期的なバックアップをお勧めします。']}
]},
'ko':{n:'한국어',t:'피드백',d:'2026년 7월 업데이트',sec:[
{h:'문의하기',p:'문제가 있거나 제안이 있으시면 연락주세요：',ul:['이메일：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：구독 취소 방법?<br>A：iPhone 설정 → Apple ID → 구독 → Huezy.']}
]},
'fr':{n:'Français',t:'Retour',d:'Mis à jour juillet 2026',sec:[
{h:'Contact',p:'Des questions ou suggestions？',ul:['Email：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：Comment annuler？<br>A：Réglages → Apple ID → Abonnements → Huezy.']}
]},
'de':{n:'Deutsch',t:'Feedback',d:'Updated July 2026',sec:[
{h:'Kontakt',p:'Fragen oder Vorschläge？',ul:['E-Mail：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：Abo kündigen?<br>A：Einstellungen → Apple ID → Abos → Huezy.']}
]},
'es':{n:'Español',t:'Comentarios',d:'Actualizado julio 2026',sec:[
{h:'Contacto',p:'¿Preguntas o sugerencias？',ul:['Email：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：¿Cancelar suscripción?<br>A：Ajustes → Apple ID → Suscripciones → Huezy.']}
]},
'pt-BR':{n:'Português',t:'Feedback',d:'Updated July 2026',sec:[

{h:'FAQ',p:'',ul:['Q：Cancelar assinatura?<br>A：Ajustes → Apple ID → Assinaturas → Huezy.']}
]},
'it':{n:'Italiano',t:'Feedback',d:'Updated July 2026',sec:[
{h:'Contatto',p:'Domande o suggerimenti？',ul:['Email：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：Annullare abbonamento?<br>A：Impostazioni → Apple ID → Abbonamenti → Huezy.']}
]},
'ru':{n:'Русский',t:'Обратная связь',d:'Обновлено июль 2026',sec:[
{h:'Контакты',p:'Вопросы или предложения？',ul:['Email：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['Q：Как отменить подписку?<br>A：Настройки → Apple ID → Подписки → Huezy.']}
]},
'ar':{n:'العربية',t:'ملاحظات',d:'تم التحديث يوليو 2026',sec:[
{h:'اتصل بنا',p:'أسئلة أو اقتراحات？',ul:['البريد：<a class="mail" href="mailto:xuanzzhang@163.com">xuanzzhang@163.com</a>']},
{h:'FAQ',p:'',ul:['س：كيفية إلغاء الاشتراك؟<br>ج：الإعدادات → Apple ID → الاشتراكات → Huezy.']}
]}
};

var L=['en','zh-Hant','ja','ko','fr','de','es','pt-BR','it','ru','ar'];
L.forEach(function(l){if(!D[l])D[l]=D['en']});

function render(lang){
  if(!D[lang])lang='en';
  var d=D[lang],h='<div class="lang-bar">';
  L.forEach(function(l){h+='<a class="'+(l===lang?'on':'')+'" onclick="render(\''+l+'\')">'+D[l].n+'</a>'});
  h+='</div><h1>'+d.t+'</h1><div class="d">'+(d.d||'')+'</div>';
  d.sec.forEach(function(s){
    h+='<section><h2>'+s.h+'</h2>';
    if(s.p)h+='<p>'+s.p+'</p>';
    if(s.ul.length)h+='<ul>'+s.ul.map(function(i){return'<li>'+i+'</li>'}).join('')+'</ul>';
    h+='</section>';
  });
  h+='<div class="ft">&copy; 2026 Huezy</div>';
  document.getElementById('app').innerHTML=h;
  document.documentElement.lang=lang;
}

var nav=(navigator.language||'en'),found=L.indexOf(nav);
if(found===-1){var n2=nav.split('-')[0];L.forEach(function(l){if(l.startsWith(n2))found=L.indexOf(l)})}
render(found!==-1?L[found]:'en');
</script>
</body>
</html>
